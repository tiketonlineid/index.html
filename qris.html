<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENTIX.ID - QRIS Final</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:linear-gradient(135deg,#050505,#081423,#0A2540);color:#fff;padding:20px;min-height:100vh}
.container{max-width:700px;margin:auto}
.card{background:rgba(10,37,64,.35);backdrop-filter:blur(12px);border-radius:24px;padding:22px;margin-bottom:18px;border:1px solid rgba(0,168,255,.25)}
.label{font-size:12px;color:#9fb3c8}
.order{color:#00A8FF;font-weight:700;font-size:18px}
.total{font-size:34px;font-weight:800}
.info{margin-top:10px;line-height:1.8}
.qrwrap{text-align:center}
.qr{display:inline-block;background:#fff;padding:14px;border-radius:24px}
.qr img{width:270px;display:block}
.upload{border:2px dashed rgba(0,168,255,.5);padding:25px;border-radius:20px;text-align:center;cursor:pointer}
.result{display:none;margin-top:15px;padding:15px;background:#1f1f1f;border-radius:14px}
.ok{color:#22c55e;font-weight:700;margin-top:8px}
.confirm{display:flex;gap:10px;margin-top:18px}
button{width:100%;margin-top:20px;padding:18px;border:none;border-radius:16px;background:linear-gradient(90deg,#00A8FF,#1E90FF);color:#fff;font-weight:800}
button:disabled{opacity:.4}
.loading{display:none;position:fixed;inset:0;background:#050505;z-index:99999;justify-content:center;align-items:center;flex-direction:column}
.spin{width:90px;height:90px;border:6px solid rgba(255,255,255,.15);border-top:6px solid #00A8FF;border-radius:50%;animation:r 1s linear infinite}
@keyframes r{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div style="text-align:center;margin-bottom:25px">
<img src="logo.png" style="max-width:260px;width:100%;">
</div>

<div class="container">

<div class="card">
<div class="label">ORDER ID</div>
<div id="orderId" class="order">-</div><br>

<div class="label">TOTAL PEMBAYARAN</div>
<div id="total" class="total">Rp 0</div>

<div class="info">
<div><b>Jenis Tiket:</b> <span id="jenisTiket">-</span></div>
<div><b>Jumlah Tiket:</b> <span id="jumlahTiket">0</span></div>
<div><b>Nama:</b> <span id="namaPemesan">-</span></div>
<div><b>WhatsApp:</b> <span id="waPemesan">-</span></div>
</div>
</div>

<div class="card qrwrap">
<div class="qr">
<img src="qri.png" alt="QRIS">
</div>
</div>

<div class="card">
<label for="file">
<div class="upload">
<h3>Upload Bukti Pembayaran</h3>
<p>Pilih file bukti pembayaran</p>
</div>
</label>

<input id="file" type="file" hidden accept="image/*">

<div id="result" class="result">
<div id="fname"></div>
<div class="ok">✓ Bukti pembayaran berhasil dipilih</div>
</div>

<div class="confirm">
<input type="checkbox" id="cek">
<label for="cek">Saya menyatakan telah melakukan pembayaran dan mengunggah bukti pembayaran yang valid.</label>
</div>

<button id="btn" disabled>KONFIRMASI PEMBAYARAN</button>
</div>
</div>

<div id="loading" class="loading">
<div class="spin"></div>
<h2 style="margin-top:20px">Memproses Pembayaran...</h2>
</div>

<script>
if(!localStorage.getItem('orderId')){
localStorage.setItem('orderId','VTX-'+Date.now());
}

document.getElementById('orderId').textContent=localStorage.getItem('orderId');

document.getElementById('total').textContent='Rp '+
Number(localStorage.getItem('totalPembayaran')||0).toLocaleString('id-ID');

document.getElementById('jenisTiket').textContent=
localStorage.getItem('jenisTiket')||'-';

document.getElementById('jumlahTiket').textContent=
localStorage.getItem('jumlahTiket')||'0';

document.getElementById('namaPemesan').textContent=
localStorage.getItem('nama')||'-';

document.getElementById('waPemesan').textContent=
localStorage.getItem('wa')||'-';

let uploaded=false;
const file=document.getElementById('file');
const cek=document.getElementById('cek');
const btn=document.getElementById('btn');

function updateBtn(){
btn.disabled=!(uploaded && cek.checked);
}

file.addEventListener('change',()=>{
if(file.files.length){
uploaded=true;
document.getElementById('result').style.display='block';
document.getElementById('fname').textContent='📎 '+file.files[0].name;
updateBtn();
}
});

cek.addEventListener('change',updateBtn);

btn.addEventListener('click',()=>{
document.getElementById('loading').style.display='flex';

setTimeout(()=>{
window.location.href='status.html';
},5000);
});
</script>

</body>
</html>
