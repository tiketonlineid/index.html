<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENTIX.ID - QRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#0b0b0b;color:#fff;padding:20px}
.container{max-width:700px;margin:auto}
.card{background:#161616;border-radius:24px;padding:22px;margin-bottom:18px;border:1px solid rgba(212,175,55,.25)}
.label{font-size:12px;color:#999}
.order{color:#D4AF37;font-weight:700;font-size:18px}
.total{font-size:34px;font-weight:800}
.qrwrap{text-align:center}
.qr{display:inline-block;background:#fff;padding:14px;border-radius:24px;box-shadow:0 0 25px rgba(255,255,255,.25)}
.qr img{width:270px;display:block}
.upload{border:2px dashed rgba(212,175,55,.4);padding:25px;border-radius:20px;text-align:center;cursor:pointer}
.result{display:none;margin-top:15px;padding:15px;background:#1f1f1f;border-radius:14px}
.ok{color:#22c55e;font-weight:700;margin-top:8px}
.confirm{display:flex;gap:10px;margin-top:18px}
.confirm input{width:18px;height:18px}
button{width:100%;margin-top:20px;padding:18px;border:none;border-radius:16px;background:#D4AF37;font-weight:800}
button:disabled{opacity:.4}
.loading{display:none;position:fixed;inset:0;background:#050505;z-index:99999;justify-content:center;align-items:center;flex-direction:column}
.spin{width:90px;height:90px;border:6px solid rgba(255,255,255,.15);border-top:6px solid #D4AF37;border-radius:50%;animation:r 1s linear infinite}
@keyframes r{to{transform:rotate(360deg)}}
.txt{margin-top:25px;font-size:22px;font-weight:700;text-align:center;padding:0 20px}
</style>
</head>
<body>
<div class="container">
<div class="card">
<div class="label">ORDER ID</div>
<div id="orderId" class="order">-</div><br>
<div class="label">TOTAL PEMBAYARAN</div>
<div id="total" class="total">Rp 0</div>
</div>

<div class="card qrwrap">
<div class="qr">
<img src="qr.png" alt="QRIS">
</div>
</div>

<div class="card">
<label for="file">
<div class="upload">
<h3>Upload Bukti Pembayaran</h3>
<p>Pilih file bukti pembayaran</p>
</div>
</label>
<input id="file" type="file" hidden accept="image/*">
<div id="result" class="result">
<div id="fname"></div>
<div class="ok">✓ Bukti pembayaran berhasil dipilih</div>
</div>

<div class="confirm">
<input type="checkbox" id="cek">
<label for="cek">Saya menyatakan telah melakukan pembayaran dan mengunggah bukti pembayaran yang valid.</label>
</div>

<button id="btn" disabled>KONFIRMASI PEMBAYARAN</button>
</div>
</div>

<div id="loading" class="loading">
<div class="spin"></div>
<div id="txt" class="txt">PEMBAYARAN SEDANG DIPROSES</div>
</div>

<script>
document.getElementById('orderId').textContent=localStorage.getItem('orderId')||'VTX-000001';
document.getElementById('total').textContent =
'Rp ' + Number(localStorage.getItem('totalPembayaran') || 0)
.toLocaleString('id-ID');
let uploaded=false;
const file=document.getElementById('file');
const cek=document.getElementById('cek');
const btn=document.getElementById('btn');

function updateBtn(){btn.disabled=!(uploaded && cek.checked);}

file.addEventListener('change',()=>{
if(file.files.length){
uploaded=true;
document.getElementById('result').style.display='block';
document.getElementById('fname').textContent='📎 '+file.files[0].name;
updateBtn();
}
});

cek.addEventListener('change',updateBtn);

btn.addEventListener('click',()=>{

/*
EMAILJS PLACEHOLDER

emailjs.send(
'SERVICE_ID',
'TEMPLATE_ID',
{
order_id: localStorage.getItem('orderId'),
total_bayar: localStorage.getItem('totalPembayaran')
},
'PUBLIC_KEY'
);
*/

document.getElementById('loading').style.display='flex';

const msgs=[
'z',
'z',
'z',
'z',
'z',
'z'
];

let i=0;
setInterval(()=>{
i++;
document.getElementById('txt').innerText=msgs[i%msgs.length];
},3000);

setTimeout(()=>{
window.location.href='status.html';
},120000);

});
</script>
</body>
</html>
